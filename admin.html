<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GeoTrade Radar · 用户管理</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      padding: 24px;
      background: #0b0e0f;
      color: #edf2ef;
      font: 13px/1.5 -apple-system, "Segoe UI", sans-serif;
    }
    h1 { font-size: 16px; margin: 0 0 16px; }
    .login-box { max-width: 720px; flex-wrap: wrap; }
    .panel { max-width: 100%; overflow-x: auto; }
    .login-box {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    input {
      background: #151b1c;
      border: 1px solid #293132;
      border-radius: 4px;
      padding: 8px 10px;
      color: #edf2ef;
      font-size: 12px;
    }
    button {
      background: #58d5bc;
      color: #06231d;
      border: none;
      border-radius: 4px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    button.secondary {
      background: #151b1c;
      color: #edf2ef;
      border: 1px solid #293132;
    }
    table {
      width: 100%;
      min-width: 920px;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid #202829;
      white-space: nowrap;
    }
    th { color: #8e9b98; font-weight: 500; }
    select { background: #151b1c; color: #edf2ef; border: 1px solid #293132; border-radius: 4px; padding: 5px; font-size: 12px; }
    .row-actions { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .row-actions input[type="date"] { min-width: 120px; }
    .status { color: #8e9b98; margin: 10px 0; min-height: 18px; }
    .error { color: #f06f62; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      max-width: 720px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: #151b1c;
      border: 1px solid #293132;
      border-radius: 6px;
      padding: 10px 14px;
    }
    .stat-card .label { color: #8e9b98; font-size: 10px; }
    .stat-card .value { font-size: 18px; font-weight: 700; margin-top: 4px; }
    .badge { padding: 2px 8px; border-radius: 999px; font-size: 10px; }
    .badge.active { background: rgba(129, 199, 132, 0.16); color: #81c784; }
    .badge.disabled { background: rgba(240, 111, 98, 0.16); color: #f06f62; }
    .login-screen {
      min-height: calc(100vh - 48px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-screen[hidden] { display: none; }
    .login-card {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #121819;
      border: 1px solid #293132;
      border-radius: 10px;
      padding: 28px 26px;
    }
    .login-card h1 { margin: 0; }
    .login-hint { margin: 0; color: #8e9b98; font-size: 12px; }
    .login-card input { width: 100%; box-sizing: border-box; }
    .login-card button { width: 100%; }
    .admin-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .admin-topbar h1 { margin: 0; }
  </style>
</head>
<body>
  <div class="login-screen" id="login-screen">
    <form class="login-card" id="login-form">
      <h1>GeoTrade Radar · 用户管理</h1>
      <p class="login-hint">请输入管理口令以进入后台</p>
      <input type="password" id="login-token" placeholder="管理口令 (ADMIN_TOKEN)" autocomplete="current-password" autofocus />
      <button type="submit" id="login-submit">登录</button>
      <div class="status error" id="login-error" hidden></div>
    </form>
  </div>

  <div class="admin-app" id="admin-app" hidden>
    <div class="admin-topbar">
      <h1>GeoTrade Radar · 用户管理</h1>
      <button class="secondary" id="logout-button">退出登录</button>
    </div>

    <div class="login-box">
      <input type="text" id="search-input" placeholder="按邮箱搜索…" />
      <select id="level-filter">
        <option value="">全部等级</option>
        <option value="free">普通用户</option>
        <option value="member">会员</option>
        <option value="pro">高级会员</option>
      </select>
      <button id="load-button">查询</button>
      <button class="secondary" id="export-button">导出 CSV</button>
    </div>

    <div class="stats-grid" id="stats-grid" hidden></div>

    <div class="status" id="status"></div>

    <div class="panel">
      <table id="user-table" hidden>
        <thead>
          <tr>
            <th>ID</th>
            <th>邮箱</th>
            <th>会员等级</th>
            <th>到期时间</th>
            <th>状态</th>
            <th>注册时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="user-tbody"></tbody>
      </table>
      <div class="login-box" id="pagination" hidden>
        <button class="secondary" id="prev-page">上一页</button>
        <span class="status" id="page-info"></span>
        <button class="secondary" id="next-page">下一页</button>
      </div>
    </div>
  </div>

  <script>
    const TOKEN_STORAGE_KEY = "geotrade-admin-token";

    const loginScreen = document.getElementById("login-screen");
    const loginForm = document.getElementById("login-form");
    const loginTokenInput = document.getElementById("login-token");
    const loginSubmit = document.getElementById("login-submit");
    const loginError = document.getElementById("login-error");
    const adminApp = document.getElementById("admin-app");
    const logoutButton = document.getElementById("logout-button");

    let adminToken = sessionStorage.getItem(TOKEN_STORAGE_KEY) || "";

    function showLoginError(message) {
      if (!message) {
        loginError.hidden = true;
        loginError.textContent = "";
        return;
      }
      loginError.hidden = false;
      loginError.textContent = message;
    }

    function showAdminApp() {
      loginScreen.hidden = true;
      adminApp.hidden = false;
    }

    function showLoginScreen() {
      adminApp.hidden = true;
      loginScreen.hidden = false;
      loginTokenInput.value = "";
      loginTokenInput.focus();
    }

    async function tryEnter(token) {
      showLoginError("");
      loginSubmit.disabled = true;
      try {
        const response = await fetch("/api/admin/stats", { headers: { "X-Admin-Token": token } });
        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          throw new Error(data.error || "管理口令不正确");
        }
        adminToken = token;
        sessionStorage.setItem(TOKEN_STORAGE_KEY, token);
        showAdminApp();
        loadPage(1);
        loadStats();
      } catch (error) {
        showLoginError(error.message);
      } finally {
        loginSubmit.disabled = false;
      }
    }

    loginForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const token = loginTokenInput.value.trim();
      if (!token) return showLoginError("请输入管理口令");
      tryEnter(token);
    });

    logoutButton.addEventListener("click", () => {
      adminToken = "";
      sessionStorage.removeItem(TOKEN_STORAGE_KEY);
      showLoginScreen();
    });

    const searchInput = document.getElementById("search-input");
    const levelFilter = document.getElementById("level-filter");
    const loadButton = document.getElementById("load-button");
    const exportButton = document.getElementById("export-button");
    const statusBox = document.getElementById("status");
    const statsGrid = document.getElementById("stats-grid");
    const table = document.getElementById("user-table");
    const tbody = document.getElementById("user-tbody");
    const pagination = document.getElementById("pagination");
    const pageInfo = document.getElementById("page-info");
    const prevPageButton = document.getElementById("prev-page");
    const nextPageButton = document.getElementById("next-page");

    const levelLabels = { free: "普通用户", member: "会员", pro: "高级会员" };
    const PAGE_SIZE = 50;
    let currentPage = 1;

    function setStatus(message, isError) {
      statusBox.textContent = message || "";
      statusBox.className = isError ? "status error" : "status";
    }

    async function adminFetch(path, options = {}) {
      const response = await fetch(path, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          "X-Admin-Token": adminToken,
          ...(options.headers || {}),
        },
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.error || "请求失败");
      return data;
    }

    function renderUsers(users) {
      tbody.innerHTML = "";
      for (const user of users) {
        const tr = document.createElement("tr");

        const select = document.createElement("select");
        for (const level of ["free", "member", "pro"]) {
          const option = document.createElement("option");
          option.value = level;
          option.textContent = levelLabels[level];
          if (level === user.memberLevel) option.selected = true;
          select.appendChild(option);
        }

        const expiresInput = document.createElement("input");
        expiresInput.type = "date";
        if (user.memberExpiresAt) expiresInput.value = user.memberExpiresAt.slice(0, 10);

        const saveButton = document.createElement("button");
        saveButton.textContent = "保存";
        saveButton.className = "secondary";
        saveButton.addEventListener("click", async () => {
          saveButton.disabled = true;
          try {
            const expiresAt = expiresInput.value ? new Date(expiresInput.value).toISOString() : null;
            await adminFetch(`/api/admin/users/${user.id}/member`, {
              method: "POST",
              body: JSON.stringify({ level: select.value, expiresAt }),
            });
            setStatus(`已更新用户 #${user.id} 为 ${levelLabels[select.value]}`, false);
          } catch (error) {
            setStatus(error.message, true);
          } finally {
            saveButton.disabled = false;
          }
        });

        const isDisabled = user.status === "disabled";
        const toggleButton = document.createElement("button");
        toggleButton.textContent = isDisabled ? "启用账号" : "封禁账号";
        toggleButton.className = "secondary";
        toggleButton.addEventListener("click", async () => {
          const nextStatus = isDisabled ? "active" : "disabled";
          if (!isDisabled && !confirm(`确定要封禁用户 #${user.id}（${user.email}）吗？该用户将被强制下线。`)) return;
          toggleButton.disabled = true;
          try {
            await adminFetch(`/api/admin/users/${user.id}/status`, {
              method: "POST",
              body: JSON.stringify({ status: nextStatus }),
            });
            setStatus(`用户 #${user.id} 已${nextStatus === "disabled" ? "封禁" : "启用"}`, false);
            loadPage(currentPage);
          } catch (error) {
            setStatus(error.message, true);
            toggleButton.disabled = false;
          }
        });

        const actionCell = document.createElement("td");
        const actionWrap = document.createElement("div");
        actionWrap.className = "row-actions";
        actionWrap.append(select, expiresInput, saveButton, toggleButton);
        actionCell.appendChild(actionWrap);

        const statusCell = document.createElement("td");
        statusCell.innerHTML = `<span class="badge ${isDisabled ? "disabled" : "active"}">${isDisabled ? "已封禁" : "正常"}</span>`;

        tr.innerHTML = `
          <td>${user.id}</td>
          <td>${user.email}</td>
          <td>${levelLabels[user.memberLevel] || user.memberLevel}</td>
          <td>${user.memberExpiresAt ? user.memberExpiresAt.slice(0, 10) : "—"}</td>
        `;
        tr.appendChild(statusCell);
        tr.insertAdjacentHTML("beforeend", `<td>${user.createdAt ? user.createdAt.slice(0, 10) : "—"}</td>`);
        tr.appendChild(actionCell);
        tbody.appendChild(tr);
      }
      table.hidden = users.length === 0;
    }

    function queryParams(extra) {
      const params = new URLSearchParams(extra);
      const search = searchInput.value.trim();
      const level = levelFilter.value;
      if (search) params.set("search", search);
      if (level) params.set("level", level);
      return params;
    }

    async function loadPage(page) {
      setStatus("加载中…", false);
      try {
        const params = queryParams({ page: String(page), pageSize: String(PAGE_SIZE) });
        const data = await adminFetch(`/api/admin/users?${params.toString()}`);
        currentPage = data.page;
        renderUsers(data.users);
        const totalPages = Math.max(1, Math.ceil(data.total / data.pageSize));
        pagination.hidden = data.total === 0;
        pageInfo.textContent = `第 ${currentPage} / ${totalPages} 页 · 共 ${data.total} 个用户`;
        prevPageButton.disabled = currentPage <= 1;
        nextPageButton.disabled = currentPage >= totalPages;
        setStatus(`共 ${data.total} 个用户`, false);
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    async function loadStats() {
      try {
        const stats = await adminFetch("/api/admin/stats");
        statsGrid.innerHTML = `
          <div class="stat-card"><div class="label">用户总数</div><div class="value">${stats.total}</div></div>
          <div class="stat-card"><div class="label">普通用户</div><div class="value">${stats.byLevel.free || 0}</div></div>
          <div class="stat-card"><div class="label">会员</div><div class="value">${stats.byLevel.member || 0}</div></div>
          <div class="stat-card"><div class="label">高级会员</div><div class="value">${stats.byLevel.pro || 0}</div></div>
          <div class="stat-card"><div class="label">已封禁</div><div class="value">${stats.disabled}</div></div>
          <div class="stat-card"><div class="label">今日新增</div><div class="value">${stats.newToday}</div></div>
          <div class="stat-card"><div class="label">近 7 日新增</div><div class="value">${stats.newThisWeek}</div></div>
        `;
        statsGrid.hidden = false;
      } catch (error) {
        // 概览加载失败不影响列表使用，静默忽略
      }
    }

    function exportCsv() {
      const url = `/api/admin/users.csv?${queryParams().toString()}`;
      fetch(url, { headers: { "X-Admin-Token": adminToken } })
        .then((response) => {
          if (!response.ok) throw new Error("导出失败");
          return response.blob();
        })
        .then((blob) => {
          const link = document.createElement("a");
          link.href = URL.createObjectURL(blob);
          link.download = `users-${Date.now()}.csv`;
          link.click();
          URL.revokeObjectURL(link.href);
        })
        .catch((error) => setStatus(error.message, true));
    }

    loadButton.addEventListener("click", () => {
      loadPage(1);
      loadStats();
    });
    levelFilter.addEventListener("change", () => loadPage(1));
    exportButton.addEventListener("click", exportCsv);
    prevPageButton.addEventListener("click", () => loadPage(currentPage - 1));
    nextPageButton.addEventListener("click", () => loadPage(currentPage + 1));

    if (adminToken) {
      tryEnter(adminToken);
    } else {
      loginTokenInput.focus();
    }
  </script>
</body>
</html>
